spring.application.name=pulse

# OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini

# Tavily
tavily.api-key=${TAVILY_API_KEY}
tavily.max-results=${TAVILY_MAX_RESULTS:10}

# Actuator
management.endpoints.web.exposure.include=health,info

# CORS (set empty in same-origin deployments)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://pulse-frontend-tawny.vercel.app,https://pulse.odieyang.com}

# Debate loop
debate.confidence.threshold=60

# Crawler
crawler.target-total=${CRAWLER_TARGET_TOTAL:50}
