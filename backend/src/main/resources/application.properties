spring.application.name=pulse

# OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini

# Tavily
tavily.api-key=${TAVILY_API_KEY}
tavily.max-results=${TAVILY_MAX_RESULTS:4}

# Actuator
management.endpoints.web.exposure.include=health,info

# CORS (set empty in same-origin deployments)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://pulse-frontend-tawny.vercel.app,https://pulse.odieyang.com}

# Debate loop
debate.confidence.threshold=60

# Crawler
crawler.target-total=${CRAWLER_TARGET_TOTAL:16}
crawler.boundary.max-posts=${CRAWLER_BOUNDARY_MAX_POSTS:24}
crawler.coverage.warn-percent=${CRAWLER_COVERAGE_WARN_PERCENT:70}
crawler.coverage.critical-percent=${CRAWLER_COVERAGE_CRITICAL_PERCENT:45}
crawler.unassigned.warn-percent=${CRAWLER_UNASSIGNED_WARN_PERCENT:40}
crawler.platform-imbalance.warn-gap=${CRAWLER_PLATFORM_IMBALANCE_WARN_GAP:70}
crawler.relevance.min-sample=${CRAWLER_RELEVANCE_MIN_SAMPLE:12}
crawler.relevance.min-score=${CRAWLER_RELEVANCE_MIN_SCORE:4}
crawler.relevance.min-retain-count=${CRAWLER_RELEVANCE_MIN_RETAIN_COUNT:2}
crawler.relevance.min-retain-ratio=${CRAWLER_RELEVANCE_MIN_RETAIN_RATIO:0.15}
crawler.relevance.max-hashtags=${CRAWLER_RELEVANCE_MAX_HASHTAGS:2}
crawler.relevance.platform-cap=${CRAWLER_RELEVANCE_PLATFORM_CAP:8}
